<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Create product</title>
</head>
<body>

<div layout:fragment="content" class="container body-content mt-4">

    <h2 class="mb-4">Thêm Sản Phẩm Mới</h2>

    <form th:action="@{/products/create}" th:object="${product}" method="post" class="form" enctype="multipart/form-data">

        <div class="form-group mb-3">
            <label for="name" class="form-label fw-bold">Name</label>
            <input class="form-control" type="text" th:field="*{productName}" id="name" placeholder="Product Name">
            <div class="alert alert-warning mt-2 py-2" th:if="${#fields.hasErrors('productName')}" th:errors="*{productName}"></div>
        </div>

        <div class="form-group mb-3">
            <label for="price" class="form-label fw-bold">Price:</label>
            <input class="form-control" type="number" th:field="*{price}" id="price" placeholder="0">
            <div class="alert alert-warning mt-2 py-2" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>

        <div class="form-group mb-3">
            <label for="image" class="form-label fw-bold">Image:</label>
            <input class="form-control" type="file" id="image" name="imageProduct" accept="image/png,image/jpeg">
            <div class="alert alert-warning mt-2 py-2" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
        </div>

        <div class="form-group mb-4">
            <label for="category" class="form-label fw-bold">Category:</label>
            <select th:field="*{categoryId}" class="form-select" id="category">
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}">
                </option>
            </select>
            <div class="alert alert-warning mt-2 py-2" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
        </div>

        <div class="form-group">
            <input type="submit" class="btn btn-success px-4" value="Add Product">
            <a th:href="@{/products}" class="btn btn-secondary ms-2">Hủy</a>
        </div>

    </form>
</div>

</body>
</html>
