<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{_layout}"> <head>
    <title>Danh Sách Sản Phẩm</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h3 class="card-title">
                <i class="bi bi-list-stars me-2 text-primary"></i>Danh Sách Sản Phẩm Hiện Có
            </h3>
            <a th:href="@{/products/create}" class="btn btn-primary btn-sm">
                <i class="bi bi-plus-circle me-1"></i>Thêm Sản Phẩm Mới
            </a>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover table-bordered align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th style="width: 5%">#</th>
                        <th style="width: 20%">Ảnh</th>
                        <th style="width: 35%">Tên Sản Phẩm</th>
                        <th style="width: 20%">Giá (VNĐ)</th>
                        <th style="width: 20%">Hành Động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="product, stat : ${listproduct}">
                        <td th:text="${stat.index + 1}"></td> <td>
                        <img th:if="${product.image != null && !#strings.isEmpty(product.image)}" th:src="@{/images/{fileName}(fileName=${product.image})}" alt="Product Image" class="img-fluid rounded" style="max-height: 80px;">
                        <img th:unless="${product.image != null && !#strings.isEmpty(product.image)}" th:src="@{/images/default-product.png}" alt="Default Product Image" class="img-fluid rounded" style="max-height: 80px; opacity: 0.5;">
                    </td>
                        <td th:text="${product.productName}" class="fw-bold text-secondary"></td>
                        <td th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td> <td>
                        <div class="d-flex gap-1">
                            <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-outline-warning btn-sm">
                                <i class="bi bi-pencil-square"></i> Sửa
                            </a>
                            <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-outline-danger btn-sm" onclick="return confirm('Bạn có chắc chắn muốn xóa sản phẩm này không?')">
                                <i class="bi bi-trash3"></i> Xóa
                            </a>
                        </div>
                    </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(listproduct)}">
                        <td colspan="5" class="text-center text-muted py-5">
                            <i class="bi bi-inbox-fill text-muted" style="font-size: 3rem;"></i>
                            <p class="mt-3">Chưa có sản phẩm nào trong danh sách. Hãy thêm sản phẩm mới!</p>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
